<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest - Core Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0B1F3F;
  --green: #00FF7F;
  --white: #FFFFFF;
  --light-navy: #132A5B;
}

body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: var(--navy);
  color: white;
}

.container{max-width:500px;margin:auto;padding:15px;}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  border-radius:20px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.nav button{
  flex:1;
}

/* CALENDAR */
#coreCalendar{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
  margin-bottom:15px;
}

.coreDayName{
  font-size:0.6rem;
  opacity:0.6;
  text-align:center;
}

.coreDay{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  font-size:0.75rem;
  transition:0.25s;
}
.coreDay:hover{transform:scale(1.08);}
.coreToday{border:2px solid #22c55e;}
.coreDone{background:#22c55e;color:black;}
.coreMulti{background:#a855f7;color:white;font-weight:600;}

/* CARD */
.card{padding:20px;text-align:center;}

/* CIRCLE */
.coreCircle{
  width:160px;
  height:160px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.6s ease;
}

.coreInner{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
}

/* TEXT */
.coreExercise{font-size:1.4rem;font-weight:600;margin-top:10px;}
.coreReps{opacity:0.7;}
.coreSetInfo{opacity:0.6;font-size:0.8rem;}
.coreTimer{font-size:2rem;margin-top:10px;}

/* BUTTONS */
button{
  margin-top:10px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#22c55e;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}
button:hover{transform:scale(1.05);}
.secondary{background:#334155;color:white;}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* FLAME */
.coreFlame{
  animation:coreFlame 1s infinite alternate;
}
@keyframes coreFlame{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<div class="top glass">
<div>XP: <span id="coreXP">0</span></div>
<div>Lvl: <span id="coreLevel">1</span></div>
<div><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#FFFFFF"><path d="M240-400q0 52 21 98.5t60 81.5q-1-5-1-9v-9q0-32 12-60t35-51l113-111 113 111q23 23 35 51t12 60v9q0 4-1 9 39-35 60-81.5t21-98.5q0-50-18.5-94.5T648-574q-20 13-42 19.5t-45 6.5q-62 0-107.5-41T401-690q-39 33-69 68.5t-50.5 72Q261-513 250.5-475T240-400Zm240 52-57 56q-11 11-17 25t-6 29q0 32 23.5 55t56.5 23q33 0 56.5-23t23.5-55q0-16-6-29.5T537-292l-57-56Zm0-492v132q0 34 23.5 57t57.5 23q18 0 33.5-7.5T622-658l18-22q74 42 117 117t43 163q0 134-93 227T480-80q-134 0-227-93t-93-227q0-129 86.5-245T480-840Z"/></svg><span id="coreStreak" class="coreFlame">0</span></div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showCoreScreen('coreMain')">Workout</button>
<button onclick="showCoreScreen('coreProfile')">Profile</button>
</div>

<!-- MAIN SCREEN -->
<div id="coreMain" class="screen active">
<div id="coreMonth"></div>
<div id="coreCalendar"></div>

<div class="card glass">
<div class="coreCircle" id="coreCircle">
  <div class="coreInner glass" id="corePercent">0/100</div>
</div>

<div class="coreExercise" id="coreExercise">Ready?</div>
<div class="coreReps" id="coreReps"></div>
<div class="coreSetInfo" id="coreSetInfo"></div>
<div class="coreTimer" id="coreTimer"></div>

<button id="coreStartBtn">Start</button>
<button class="secondary" id="coreResetBtn">Reset</button>
</div>
<button class="secondary" id="coreResetProgressBtn">Reset Progress</button>
</div>

<!-- PROFILE SCREEN -->
<div id="coreProfile" class="screen glass card">
<h2>Your Profile</h2>
<p>Total XP: <span id="profileCoreXP"></span></p>
<p>Level: <span id="profileCoreLevel"></span></p>
<p>Workout Days: <span id="profileCoreDays"></span></p>
<p>Best Streak: <span id="profileCoreStreak"></span></p>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

// DATE HELPER
function getCoreDate(){
  let d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// CORE WORKOUT DATA (10x10)
const coreWorkout = [
  ["Sit-Ups",10],
  ["Hollow Hold (10s)",10],
  ["Russian Twists (per side)",10],
  ["Leg Raises",10],
  ["Plank Shoulder Taps (per side)",10],
  ["Bicycle Crunches (per side)",10],
  ["V-Ups",10],
  ["Flutter Kicks (per side)",10],
  ["Side Plank Hip Dips (per side)",10],
  ["Mountain Climbers (per side)",10]
];

let coreIndex = 0;
let coreTotal = 0;

// STATS STORAGE
let coreXP = +localStorage.getItem("coreXP") || 0;
let coreDaysCompleted = JSON.parse(localStorage.getItem("coreCompletedDays") || "{}");

// CORE DOM ELEMENTS
const coreXPEl = document.getElementById("coreXP");
const coreLevelEl = document.getElementById("coreLevel");
const coreStreakEl = document.getElementById("coreStreak");

const coreExerciseEl = document.getElementById("coreExercise");
const coreRepsEl = document.getElementById("coreReps");
const coreSetInfoEl = document.getElementById("coreSetInfo");
const corePercentEl = document.getElementById("corePercent");
const coreCircleEl = document.getElementById("coreCircle");
const coreCalendarEl = document.getElementById("coreCalendar");

const profileXP = document.getElementById("profileCoreXP");
const profileLevel = document.getElementById("profileCoreLevel");
const profileDays = document.getElementById("profileCoreDays");
const profileStreak = document.getElementById("profileCoreStreak");

const coreStartBtn = document.getElementById("coreStartBtn");
const coreResetBtn = document.getElementById("coreResetBtn");
const coreResetProgressBtn = document.getElementById("coreResetProgressBtn");

// NAV
window.showCoreScreen = (id)=>{
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  updateCoreProfile();
};

// UPDATE STATS
function updateCoreStats(){
  coreXPEl.innerText = coreXP;
  coreLevelEl.innerText = Math.floor(coreXP/100)+1;
  coreStreakEl.innerText = Object.keys(coreDaysCompleted).length;
}

// UPDATE PROFILE
function updateCoreProfile(){
  profileXP.innerText = coreXP;
  profileLevel.innerText = Math.floor(coreXP/100)+1;
  profileDays.innerText = Object.keys(coreDaysCompleted).length;
  profileStreak.innerText = Object.keys(coreDaysCompleted).length;
}

// CIRCLE
function updateCoreCircle(){
  if(coreTotal>100) coreTotal=100;
  let p = coreTotal/100;
  coreCircleEl.style.background = `conic-gradient(#22c55e ${p*360}deg,#1e293b ${p*360}deg)`;
  corePercentEl.innerText = coreTotal+"/100";
}

// RENDER CORE WORKOUT
function renderCoreWorkout(){
  if(coreIndex >= coreWorkout.length){
    let today = getCoreDate();
    coreDaysCompleted[today] = (coreDaysCompleted[today]||0)+1;
    localStorage.setItem("coreCompletedDays", JSON.stringify(coreDaysCompleted));
    coreXP += 50;
    localStorage.setItem("coreXP", coreXP);
    renderCoreCalendar();
    updateCoreStats();
    coreExerciseEl.innerText = "Complete";
    coreTotal = 100;
    updateCoreCircle();
    return;
  }
  coreExerciseEl.innerText = coreWorkout[coreIndex][0];
  coreRepsEl.innerText = coreWorkout[coreIndex][1]+" reps";
  coreSetInfoEl.innerText = `Set ${coreIndex+1}/${coreWorkout.length}`;
  updateCoreCircle();
}

// BUTTONS
coreStartBtn.onclick = ()=>{
  coreTotal += 10;
  coreIndex++;
  renderCoreWorkout();
};

coreResetBtn.onclick = ()=>{
  coreIndex = 0;
  coreTotal = 0;
  renderCoreWorkout();
};

// CALENDAR
function renderCoreCalendar(){
  coreCalendarEl.innerHTML = "";
  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();

  document.getElementById("coreMonth").innerText = now.toLocaleString("default",{month:"long"})+" "+year;

  let firstDay = new Date(year,month,1).getDay();
  let daysInMonth = new Date(year,month+1,0).getDate();

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(n=>{
    let el = document.createElement("div");
    el.className = "coreDayName";
    el.innerText = n;
    coreCalendarEl.appendChild(el);
  });

  for(let i=0;i<firstDay;i++) coreCalendarEl.appendChild(document.createElement("div"));

  let todayStr = getCoreDate();

  for(let d=1; d<=daysInMonth; d++){
    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let div = document.createElement("div");
    div.className = "coreDay glass";

    if(dateStr===todayStr) div.classList.add("coreToday");

    if(coreDaysCompleted[dateStr]){
      div.classList.add(coreDaysCompleted[dateStr]>1?"coreMulti":"coreDone");
      div.innerText = coreDaysCompleted[dateStr];
    } else {
      div.innerText = d;
    }
    coreCalendarEl.appendChild(div);
  }
}

// RESET PROGRESS
coreResetProgressBtn.onclick = ()=>{
  if(confirm("Are you sure you want to reset all core progress?")){
    localStorage.removeItem("coreXP");
    localStorage.removeItem("coreCompletedDays");
    coreXP = 0;
    coreTotal = 0;
    coreIndex = 0;
    coreDaysCompleted = {};
    updateCoreStats();
    updateCoreProfile();
    renderCoreWorkout();
    renderCoreCalendar();
  }
};

// INIT
updateCoreStats();
renderCoreWorkout();
renderCoreCalendar();

});
</script>
</body>
</html>
