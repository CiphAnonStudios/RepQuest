<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

.container{max-width:500px;margin:auto;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

/* EXERCISE */
.exercise{font-size:1.5rem;font-weight:600;}
.reps{opacity:0.7;}
.setinfo{opacity:0.6;margin-top:5px;}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  background:#22c55e;
  font-weight:600;
}

/* TIMER */
.timer{font-size:2rem;text-align:center;margin-top:10px;}

/* PROGRESS */
.progress{height:8px;background:#1e293b;border-radius:10px;margin-top:10px;}
.fill{height:100%;background:#22c55e;width:0%;}

/* CALENDAR */
#calendar{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
}

.day{
  aspect-ratio:1;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  background:#1e293b;
}

.done{background:#22c55e;color:black;}
.multi{background:#a855f7;color:white;font-weight:600;}
</style>
</head>

<body>

<div class="container">

<h2>RepQuest</h2>
<p>XP: <span id="xp">0</span> | Level: <span id="level">1</span> | Streak: <span id="streak">0</span></p>

<div class="card">
<div class="exercise" id="exercise">Ready?</div>
<div class="reps" id="reps"></div>
<div class="setinfo" id="setinfo"></div>

<div class="timer" id="timer"></div>

<button id="btn" onclick="next()">Start Workout</button>

<div class="progress"><div id="fill" class="fill"></div></div>

<button onclick="resetSession()" style="background:#334155;color:white;">Reset Session</button>
</div>

<div class="card">
<h3>Progress Calendar</h3>
<div id="calendar"></div>
</div>

</div>

<script>
// ===== WORKOUT =====
const workout=[
["Push-ups",10],
["Wide Push-ups",10],
["Diamond Push-ups",10],
["Pike Push-ups",10],
["Decline Push-ups",10],
["Archer Push-ups",10],
["Explosive Push-ups",10],
["Spiderman Push-ups",10],
["Slow Push-ups",10]
];

let i=-1,resting=false,timerInt;

// ===== STORAGE =====
let xp=+localStorage.xp||0;
let streak=+localStorage.streak||0;
let last=localStorage.last||"";
let completedDays=JSON.parse(localStorage.completedDays||"{}");

// ===== STREAK =====
let today=new Date().toDateString();
if(last!==today){
  streak++;
  localStorage.last=today;
}

// ===== UPDATE UI =====
function updateStats(){
  xpSpan.innerText=xp;
  level.innerText=Math.floor(xp/100)+1;
  streakSpan.innerText=streak;
}

// ===== RENDER =====
function render(){
  if(i<0){
    exercise.innerText="Ready?";
    reps.innerText="";
    setinfo.innerText="";
    fill.style.width="0%";
    return;
  }

  if(i>=workout.length){
    exercise.innerText="Workout Complete";
    reps.innerText="";
    setinfo.innerText="";
    btn.disabled=true;

    xp+=50;
    localStorage.xp=xp;

    markDay();

    updateStats();
    renderCalendar();

    return;
  }

  exercise.innerText=workout[i][0];
  reps.innerText=workout[i][1]+" reps";
  setinfo.innerText=`Set ${i+1}/${workout.length}`;

  fill.style.width=((i+1)/workout.length*100)+"%";
}

// ===== REST =====
function rest(){
  let t=45;
  resting=true;
  btn.disabled=true;

  timerInt=setInterval(()=>{
    timer.innerText=t+"s";
    t--;

    if(t<0){
      clearInterval(timerInt);
      timer.innerText="";
      resting=false;
      btn.disabled=false;
    }
  },1000);
}

// ===== FLOW =====
function next(){
  if(resting) return;
  i++;
  if(i>0) rest();
  render();
}

// ===== RESET SESSION ONLY =====
function resetSession(){
  i=-1;
  render();
}

// ===== CALENDAR LOGIC =====
function markDay(){
  let date=new Date().toISOString().split("T")[0];
  completedDays[date]=(completedDays[date]||0)+1;
  localStorage.completedDays=JSON.stringify(completedDays);
}

// ===== RENDER CALENDAR =====
function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  let now=new Date();
  let year=now.getFullYear();
  let month=now.getMonth();

  let days=new Date(year,month+1,0).getDate();

  for(let d=1;d<=days;d++){
    let dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    
    let div=document.createElement("div");
    div.classList.add("day");
    div.innerText=d;

    if(completedDays[dateStr]){
      if(completedDays[dateStr]===1){
        div.classList.add("done");
        div.innerText="1";
      } else {
        div.classList.add("multi");
        div.innerText=completedDays[dateStr];
      }
    }

    cal.appendChild(div);
  }
}

// ===== INIT =====
updateStats();
render();
renderCalendar();
</script>

</body>
</html>
