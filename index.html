<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:white;
}
.container {
  max-width:500px;
  margin:auto;
  padding:20px;
  padding-bottom:80px;
}
h1 {text-align:center;}
.card {
  background:#1e293b;
  border-radius:20px;
  padding:25px;
  margin-top:20px;
  text-align:center;
}
.exercise-name {
  font-size:1.5rem;
  font-weight:600;
  margin-bottom:10px;
}
.reps {font-size:1.2rem; opacity:0.8; margin-bottom:15px;}
.timer {font-size:2rem; margin:20px 0;}
button {
  padding:15px;
  width:100%;
  border:none;
  border-radius:15px;
  background:#22c55e;
  color:black;
  font-weight:600;
  cursor:pointer;
}
button:disabled {background:#475569; cursor:not-allowed;}
.progress {
  height:10px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}
.progress-fill {
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}
.stats {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:0.9rem;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="container">
<h1>RepQuest Coach</h1>
<div class="stats">
<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Streak: <span id="streak">0</span></div>
</div>

<div class="card">
<div class="exercise-name" id="exerciseName">Ready?</div>
<div class="reps" id="reps"></div>
<div class="timer" id="timer"></div>
<button id="actionBtn" onclick="nextStep()">Start Workout</button>
<div class="progress">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>
</div>

<script>
// ===== WORKOUT PLAN =====
const workout = [
  ["Normal Push-ups", 10],
  ["Wide Push-ups", 10],
  ["Diamond Push-ups", 10],
  ["Pike Push-ups", 10],
  ["Decline Push-ups", 10],
  ["Archer Push-ups", 10],
  ["Explosive Push-ups", 10],
  ["Spiderman Push-ups", 10],
  ["Slow Tempo Push-ups", 10]
];

// ===== STATE =====
let index = -1;
let resting = false;
let timerInterval;

// ===== STORAGE =====
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate") || "";

// DAILY STREAK
let today = new Date().toDateString();
if(lastDate !== today){ streak++; localStorage.setItem("lastDate", today); }

// ===== UPDATE STATS =====
function updateStats() {
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp/100)+1;
  document.getElementById("streak").innerText = streak;
}

// ===== RENDER EXERCISE =====
function renderExercise() {
  if(index < 0) {
    exerciseName.innerText = "Ready?";
    reps.innerText = "";
    progressFill.style.width = "0%";
    return;
  }
  if(index >= workout.length){
    exerciseName.innerText = "Workout Complete!";
    reps.innerText = "";
    actionBtn.disabled = true;
    xp += 50;
    localStorage.setItem("xp", xp);
    updateStats();
    progressFill.style.width = "100%";
    return;
  }
  exerciseName.innerText = workout[index][0];
  reps.innerText = workout[index][1] + " reps";
  progressFill.style.width = ((index+1)/workout.length*100) + "%";
}

// ===== REST TIMER =====
function startRest() {
  let time = 45;
  resting = true;
  actionBtn.disabled = true;
  timerInterval = setInterval(() => {
    timer.innerText = time + "s Rest";
    time--;
    if(time < 0){
      clearInterval(timerInterval);
      timer.innerText = "";
      resting = false;
      actionBtn.disabled = false;
    }
  }, 1000);
}

// ===== WORKOUT FLOW =====
function nextStep() {
  if(resting) return;
  index++;
  if(index > 0) startRest();
  renderExercise();
}

// ===== INIT =====
updateStats();
renderExercise();
</script>

</body>
</html>
