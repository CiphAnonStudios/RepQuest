<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepQuest Loading</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<style>
  :root {
    --navy: #0B1F3F;
    --green: #00FF7F;
    --white: #FFFFFF;
    --light-navy: #132A5B;
  }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--navy);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
  }

  /* Animated background dots */
  .dots {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveDots 10s linear infinite;
  }

  @keyframes moveDots {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
  }

  #logo {
    width: 200px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 1s ease, transform 0.8s ease;
    z-index: 2;
  }

  .green {
    animation: pulseGlow 1s infinite alternate;
    filter: drop-shadow(0 0 15px var(--green));
  }

  @keyframes pulseGlow {
    0% { transform: scale(1.2); filter: drop-shadow(0 0 15px var(--green)); }
    100% { transform: scale(1.3); filter: drop-shadow(0 0 25px var(--green)); }
  }
</style>
</head>
<body>
  <div class="dots"></div>
  <img id="logo" src="RepQuestLogo.png" alt="RepQuest Logo">

  <script>
    const logo = document.getElementById('logo');

    // Fade in logo with slight scale
    setTimeout(() => {
      logo.style.opacity = 1;
      logo.style.transform = 'scale(1)';
    }, 100);

    // Change to green with glow and pulse
    setTimeout(() => {
      logo.src = 'RepQuestLogoGreen.png';
      logo.classList.add('green');
    }, 1500);

    // Redirect to home
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 3500);
  </script>
</body>
</html>
